name: Build And Attach Executables

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os_name }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os_name: linux
            arch: x64
            ext: ""
          - runner: ubuntu-24.04-arm
            os_name: linux
            arch: arm64
            ext: ""
          - runner: windows-latest
            os_name: windows
            arch: x64
            ext: ".exe"
          - runner: windows-11-arm
            os_name: windows
            arch: arm64
            ext: ".exe"
          - runner: macos-latest
            os_name: macos
            arch: arm64
            ext: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          architecture: ${{ matrix.arch }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[build]"

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --clean --onefile --name beast --optimize=2 src/beast_chess/main.py

      - name: Upload binary to GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          asset_name="beast-${{ github.event.release.tag_name }}-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.ext }}"
          cp "dist/beast${{ matrix.ext }}" "dist/${asset_name}"
          gh release upload "${{ github.event.release.tag_name }}" "dist/${asset_name}" --clobber

  upload-model:
    name: Upload model
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Upload model to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          model_file="$(python - <<'PY'
          import pathlib
          import re

          text = pathlib.Path("src/beast_chess/infra/constants.py").read_text(encoding="utf-8")
          match = re.search(r'DEFAULT_MODEL_FILE\s*=\s*"([^"]+)"', text)
          print(match.group(1))
          PY
          )"
          gh release upload "${{ github.event.release.tag_name }}" "${model_file}" --clobber
