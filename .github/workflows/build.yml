name: Build And Attach Executables

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os_name }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os_name: linux
            arch: x64
            ext: ""
          - runner: ubuntu-24.04-arm
            os_name: linux
            arch: arm64
            ext: ""
          - runner: windows-latest
            os_name: windows
            arch: x64
            ext: ".exe"
          - runner: windows-11-arm
            os_name: windows
            arch: arm64
            ext: ".exe"
          - runner: macos-latest
            os_name: macos
            arch: arm64
            ext: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          architecture: ${{ matrix.arch }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[build]"

      - name: Write release version into package
        shell: pwsh
        run: >
          python -c 'from pathlib import Path; import tomllib; version =
          tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"];
          Path("src/beast_chess/_version.py").write_text(f"__version__ = \"{version}\"\n", encoding="utf-8")'

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --clean --onefile --name beast --optimize=2 src/beast_chess/main.py

      - name: Prepare asset name
        id: prepare-asset
        shell: bash
        run: |
          asset_name="beast-${{ github.event.release.tag_name }}-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.ext }}"
          echo "asset_name=${asset_name}" >> "$GITHUB_OUTPUT"

      - name: Copy and rename binary
        shell: bash
        run: |
          cp "dist/beast${{ matrix.ext }}" "dist/${{ steps.prepare-asset.outputs.asset_name }}"

      - name: Upload binary to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release upload "${{ github.event.release.tag_name }}"
          "dist/${{ steps.prepare-asset.outputs.asset_name }}" --clobber

  upload-model:
    name: Upload model
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Find model file
        id: model-file
        shell: bash
        run: |
          model_file="$(python - <<'PY'
          import pathlib
          import re

          text = pathlib.Path("src/beast_chess/infra/constants.py").read_text(encoding="utf-8")
          match = re.search(r'DEFAULT_MODEL_FILE\s*=\s*"([^"]+)"', text)
          print(match.group(1))
          PY
          )"
          echo "model_file=${model_file}" >> "$GITHUB_OUTPUT"

      - name: Upload model to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release upload "${{ github.event.release.tag_name }}"
          "${{ steps.model-file.outputs.model_file }}" --clobber
