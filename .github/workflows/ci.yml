name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]

      - name: Lint
        run: ruff check .

      - name: Smoke test package import
        run: python -c "from beast_chess import __version__; from beast_chess.main import main; print(__version__)"
